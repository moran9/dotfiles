# xsettingsd — broadcasts theme/font settings via XSettings so XWayland
# clients (Electron, Chromium, Discord, JetBrains, etc.) pick up the
# Catppuccin theme even though they don't read environment.d or
# gsettings directly.
#
# Values mirror what gsettings has set on the GNOME schema.

Net/ThemeName        "catppuccin-mocha-mauve-standard+default"
Net/IconThemeName    "Papirus-Dark"
Net/CursorThemeName  "catppuccin-mocha-dark-cursors"
Net/EnableEventSounds 0

Gtk/CursorThemeName  "catppuccin-mocha-dark-cursors"
Gtk/CursorThemeSize  24
Gtk/DecorationLayout "menu:close"
Gtk/EnableAnimations 1
Gtk/ToolbarStyle     "both-horiz"
Gtk/FontName         "Noto Sans 11"
Gtk/MonospaceFontName "JetBrainsMono Nerd Font 10"

Xft/Antialias 1
Xft/Hinting   1
Xft/HintStyle "hintslight"
Xft/RGBA      "rgb"
Xft/DPI       -1
