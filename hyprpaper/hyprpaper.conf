# hyprpaper — wallpaper daemon.
# Drop a wallpaper at ~/.config/hypr/wallpapers/default.jpg
# (apply.sh creates a Catppuccin gradient there if you don't have one).

preload   = ~/.config/hypr/wallpapers/default.jpg

# Per-monitor assignment. The empty-name catch-all (`wallpaper = , …`)
# logs "Monitor X has no target" on this build of hyprpaper, so we
# name the outputs explicitly. Update these to match your `hyprctl
# monitors` output when you swap hardware.
wallpaper = DP-3,     ~/.config/hypr/wallpapers/default.jpg
wallpaper = HDMI-A-1, ~/.config/hypr/wallpapers/default.jpg

splash = false
ipc    = on
