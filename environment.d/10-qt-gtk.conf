# Qt / GTK theming env. Read by `systemd --user`, then exported to every
# user-session process — including ones not spawned by Hyprland.
#
# Hyprland's `env =` lines in conf.d/00-env.conf set the same values
# but only apply to processes Hyprland spawns. Having them here too
# ensures things started outside the compositor (D-Bus activations,
# user services, KDE/GNOME portal apps) get themed consistently.

QT_QPA_PLATFORM=wayland
# qt6ct/qt5ct: minimal platform-theme bridge. Loads style=Fusion +
# the static Catppuccin custom palette in ~/.config/qt6ct/colors/.
QT_QPA_PLATFORMTHEME=qt6ct
GTK_THEME=catppuccin-mocha-mauve-standard+default
XCURSOR_THEME=catppuccin-mocha-dark-cursors
XCURSOR_SIZE=24
