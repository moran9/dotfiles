[General]
# Catppuccin Mocha for CopyQ.
# Loadable via the GUI (Preferences → Appearance → Load), but apply.sh
# also writes these keys directly into copyq.conf's [Theme] section
# so a fresh CopyQ install picks them up immediately.

# ── Backgrounds / foregrounds ────────────────────────────────────
bg=#1e1e2e
fg=#cdd6f4
alt_bg=#181825
sel_bg=#cba6f7
sel_fg=#11111b

# ── Edit mode ────────────────────────────────────────────────────
edit_bg=#1e1e2e
edit_fg=#cdd6f4

# ── Search highlight ─────────────────────────────────────────────
find_bg=#f9e2af
find_fg=#11111b

# ── Notes (annotations on items) ─────────────────────────────────
notes_bg=#313244
notes_fg=#cdd6f4

# ── Line numbers ─────────────────────────────────────────────────
num_fg=#6c7086
show_number=true
show_scrollbars=true

# ── Fonts (QFont serialised form: family, pt, px, styleHint,
#    weight, italic, underline, strike, fixedPitch, raw) ──
font="JetBrainsMono Nerd Font,10,-1,5,400,0,0,0,0,0"
edit_font="JetBrainsMono Nerd Font,11,-1,5,400,0,0,0,0,0"
find_font="JetBrainsMono Nerd Font,10,-1,5,400,0,0,0,0,0"
notes_font="JetBrainsMono Nerd Font,11,-1,5,400,0,0,0,0,0"
num_font="JetBrainsMono Nerd Font,8,-1,5,400,0,0,0,0,0"

# ── CSS overrides (apply on top of the QPalette) ─────────────────
css=
item_css=
alt_item_css=
sel_item_css=
notes_css=
