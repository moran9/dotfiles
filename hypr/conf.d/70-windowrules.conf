# Window rules.

# Suppress maximize for everything (Hyprland tiles).
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# Fix dragging glitches in XWayland popups with no class/title.
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# hyprland-run launcher: pin to bottom-left as a floating bar.
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move  = 20 monitor_h-120
    float = yes
}

# hdrop dropdown terminal — Quake-style floating panel.
windowrule {
    name = kitty-dropdown
    match:class = kitty_dropdown
    float     = true
    size      = 80% 40%
    move      = 10% 5%
    animation = slide
    workspace = special:hdrop
    opacity   = 0.85
}

# Cheatsheet popup: centered, floating, never tiled.
windowrule {
    name  = hypr-cheatsheet
    match:class = hypr-cheatsheet
    float    = true
    size     = 70% 70%
    center   = 1
    pin      = true
    opacity  = 0.95
    rounding = 14
    animation = popin
}

# Audio mixer (pulsemixer in floating kitty), spawned from waybar.
windowrule {
    name  = hypr-audio-popup
    match:class = hypr-audio-popup
    float    = true
    size     = 540 360
    move     = 100%-560 60
    pin      = true
    opacity  = 0.92
    rounding = 14
    animation = slide
}

# Bluetooth manager (bluetuith in floating kitty).
windowrule {
    name  = hypr-bt-popup
    match:class = hypr-bt-popup
    float    = true
    size     = 620 420
    move     = 100%-640 60
    pin      = true
    opacity  = 0.92
    rounding = 14
    animation = slide
}

# Common floats: dialogs, pickers, pop-up auth.
windowrule {
    name = float-dialogs
    match:class = ^(pavucontrol|nm-applet|nwg-look|file-roller|blueman-manager)$
    float = true
}

windowrule {
    name = float-polkit
    match:class = ^(polkit-kde-authentication-agent-1|xdg-desktop-portal-gtk)$
    float  = true
    center = 1
}

# Picture-in-picture: float and pin (visible across workspaces).
windowrule {
    name = pip
    match:title = ^(Picture-in-Picture)$
    float  = true
    pin    = true
    size   = 480 270
    move   = 100%-500 100%-310
}
