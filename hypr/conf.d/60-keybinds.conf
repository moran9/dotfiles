# Keybindings.
#
# Lines tagged with `# @cheat: <category> | <description>` are picked
# up by ~/.config/hypr/scripts/cheatsheet.sh (bound to SUPER+/) and
# rendered as a quick-reference popup.

$mainMod    = SUPER
$terminal   = kitty
$fileManager = nautilus
$menu       = wofi --show drun

# ── Apps ────────────────────────────────────────────────────────────
bind = $mainMod, Q, exec, $terminal                           # @cheat: apps | open terminal
bind = $mainMod, E, exec, $fileManager                        # @cheat: apps | file manager
bind = $mainMod, SPACE, exec, $menu                           # @cheat: apps | app launcher (wofi)
bind = $mainMod,       V, exec, copyq toggle                                        # @cheat: apps | clipboard manager (CopyQ)
bind = $mainMod SHIFT, V, exec, copyq menu                                          # @cheat: apps | clipboard popup at cursor
bind = , F12, exec, ~/.local/bin/hdrop kitty --class kitty_dropdown                  # @cheat: apps | dropdown terminal

# ── Window management ───────────────────────────────────────────────
bind = $mainMod, C, killactive,                               # @cheat: window | close focused window
bind = $mainMod, F, fullscreen, 0                             # @cheat: window | fullscreen
bind = $mainMod, T, togglefloating,                           # @cheat: window | toggle float
bind = $mainMod, P, pseudo,                                   # @cheat: window | pseudo (dwindle)
bind = $mainMod, J, layoutmsg, togglesplit                    # @cheat: window | toggle split direction

# Move focus.
bind = $mainMod, left,  movefocus, l                          # @cheat: focus | focus left
bind = $mainMod, right, movefocus, r                          # @cheat: focus | focus right
bind = $mainMod, up,    movefocus, u                          # @cheat: focus | focus up
bind = $mainMod, down,  movefocus, d                          # @cheat: focus | focus down

# Move window within current workspace.
bind = $mainMod SHIFT, left,  movewindow, l                   # @cheat: focus | move window left
bind = $mainMod SHIFT, right, movewindow, r                   # @cheat: focus | move window right
bind = $mainMod SHIFT, up,    movewindow, u                   # @cheat: focus | move window up
bind = $mainMod SHIFT, down,  movewindow, d                   # @cheat: focus | move window down

# Mouse drag move/resize.
bindm = $mainMod, mouse:272, movewindow                       # @cheat: window | drag to move (SUPER+LMB)
bindm = $mainMod, mouse:273, resizewindow                     # @cheat: window | drag to resize (SUPER+RMB)

# ── Resize submap ───────────────────────────────────────────────────
bind = $mainMod, R, submap, resize                            # @cheat: window | enter resize mode (Return to exit)
submap = resize
binde = , right,  resizeactive, 30 0
binde = , left,   resizeactive, -30 0
binde = , up,     resizeactive, 0 -30
binde = , down,   resizeactive, 0 30
binde = , Return, submap, reset
binde = , escape, submap, reset
submap = reset

# ── Workspaces ──────────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1                              # @cheat: workspace | switch to ws 1 (primary)
bind = $mainMod, 2, workspace, 2                              # @cheat: workspace | switch to ws 2 (secondary)
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1                  # @cheat: workspace | move window → ws N
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1                   # @cheat: workspace | scroll to next
bind = $mainMod, mouse_up,   workspace, e-1                   # @cheat: workspace | scroll to previous
bind = $mainMod, Tab,        workspace, previous              # @cheat: workspace | last workspace

# Scratchpad.
bind = $mainMod,       S, togglespecialworkspace, magic       # @cheat: workspace | toggle scratchpad
bind = $mainMod SHIFT, S, movetoworkspace, special:magic      # @cheat: workspace | move window → scratchpad

# ── System ──────────────────────────────────────────────────────────
bind = $mainMod,        F12,   exec, ~/.config/hypr/scripts/cheatsheet.sh    # @cheat: system | cheatsheet (this popup)
bind = $mainMod,        N,     exec, makoctl dismiss                          # @cheat: system | dismiss top notification
bind = $mainMod SHIFT,  N,     exec, makoctl dismiss --all                    # @cheat: system | dismiss ALL notifications
bind = $mainMod SHIFT,  L,     exec, loginctl lock-session                  # @cheat: system | lock screen now
bind = $mainMod,        M,     exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit  # @cheat: system | exit / shutdown menu
bind = ALT SHIFT,      4, exec, ~/.config/hypr/scripts/screenshot.sh region            # @cheat: system | screenshot region → clipboard + file
bind = ALT SHIFT,      5, exec, ~/.config/hypr/scripts/screenshot.sh region annotate   # @cheat: system | screenshot region → annotate (satty) → clipboard
bind = ,           Print, exec, ~/.config/hypr/scripts/screenshot.sh screen            # @cheat: system | screenshot full screen → clipboard + file
bind = $mainMod,   Print, exec, ~/.config/hypr/scripts/screenshot.sh window            # @cheat: system | screenshot active window → clipboard + file

# ── Multimedia keys ─────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute   @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl  = , XF86AudioNext,  exec, playerctl next
bindl  = , XF86AudioPause, exec, playerctl play-pause
bindl  = , XF86AudioPlay,  exec, playerctl play-pause
bindl  = , XF86AudioPrev,  exec, playerctl previous
