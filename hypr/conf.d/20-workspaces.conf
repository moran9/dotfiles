# Persistent workspaces, split across monitors.
# Odd  → $primary, even → $secondary (defined in 10-monitors.conf).
# `default:true` makes ws 1 the one that opens first on $primary.

workspace = 1,  monitor:$primary,   persistent:true, default:true
workspace = 3,  monitor:$primary,   persistent:true
workspace = 5,  monitor:$primary,   persistent:true
workspace = 7,  monitor:$primary,   persistent:true
workspace = 9,  monitor:$primary,   persistent:true

workspace = 2,  monitor:$secondary, persistent:true
workspace = 4,  monitor:$secondary, persistent:true
workspace = 6,  monitor:$secondary, persistent:true
workspace = 8,  monitor:$secondary, persistent:true
workspace = 10, monitor:$secondary, persistent:true
