# Programs and daemons launched once when Hyprland starts.
#
# IMPORTANT prelude: propagate Wayland session env into the systemd
# user manager and the D-Bus activation env. Without this, daemons
# spawned by exec-once (and any systemd user units they touch) often
# fail to connect to Wayland because WAYLAND_DISPLAY / XDG_CURRENT_DESKTOP
# aren't visible to them. This is what `uwsm` does automatically when
# it launches Hyprland; we do it manually here for `start-hyprland`.
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP DISPLAY HYPRLAND_INSTANCE_SIGNATURE
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP DISPLAY HYPRLAND_INSTANCE_SIGNATURE

# Notification daemon.
exec-once = mako

# Idle daemon — drives auto-lock and DPMS via ~/.config/hypr/hypridle.conf.
# The waybar caffeine toggle starts/stops this process to inhibit sleep.
exec-once = hypridle

# Wallpaper daemon (config at ~/.config/hypr/hyprpaper.conf).
exec-once = hyprpaper

# Status bar.
exec-once = waybar

# Polkit auth dialog (used by GUI apps that ask for sudo).
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# Clipboard manager (CopyQ): full GUI + tray icon + history with images.
exec-once = copyq

# Generic XDG portals: hyprland handles screen-share, gtk handles
# file-chooser/print dialogs for Electron/Chromium/non-KDE apps.
exec-once = systemctl --user start xdg-desktop-portal-hyprland.service
exec-once = systemctl --user start xdg-desktop-portal-gtk.service

# XSettings daemon — broadcasts the GTK theme/font/cursor settings to
# XWayland clients (Electron, Chromium-based apps) so their native
# file pickers honour the dark Catppuccin theme.
exec-once = xsettingsd -c ~/.config/xsettingsd/xsettingsd.conf
