# Environment variables exported to every Hyprland-spawned process.

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Force zsh as the default interactive shell so kitty (and anything
# else inheriting $SHELL) opens zsh regardless of the parent process.
env = SHELL,/usr/bin/zsh

# $TERMINAL is read by xdg-open, wofi, and many "Terminal=true"
# .desktop launchers. Without it, btop / ranger / lazygit / htop fail
# to open from the app launcher because the runner doesn't know which
# terminal to spawn them in.
env = TERMINAL,kitty

# Wayland / electron / qt sane defaults.
env = QT_QPA_PLATFORM,wayland
# qt6ct/qt5ct loads style=Fusion + the Catppuccin custom palette below.
# We deliberately don't go further (no Kvantum / KColorScheme /
# hyprqt6engine) — those rabbit-holes don't fix KDE-Frameworks-6 apps
# anyway. Stock Breeze is fine for the rare KDE app you may open.
env = QT_QPA_PLATFORMTHEME,qt6ct
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = NIXOS_OZONE_WL,1

# GTK theming — read by GTK3/4 apps and gnome-portal apps.
env = GTK_THEME,catppuccin-mocha-mauve-standard+default
env = XCURSOR_THEME,catppuccin-mocha-dark-cursors
