# =====================================================================
# MONITORS — edit per machine.
# =====================================================================
# Run `hyprctl monitors` to discover output names (e.g. DP-3, HDMI-A-1,
# eDP-1) and supported modes.
#
# Format: monitor = <name>, <resolution>@<rate>, <position>, <scale>
#
# IMPORTANT: After defining your physical outputs, set $primary and
# $secondary so workspace assignments (in 20-workspaces.conf) bind to
# the right outputs. Odd workspaces (1,3,5,7,9) live on $primary,
# even workspaces (2,4,6,8,10) on $secondary.
#
# Single-monitor users: leave both as `,` (the catch-all). All
# workspaces will land on the only output you have.
# =====================================================================

# Catch-all fallback so any unrecognized output still gets a sane mode.
monitor = , preferred, auto, 1


# --- Dual 27" 1440p (this machine) ---
monitor=DP-3,2560x1440@239.97,2560x0,1.0
monitor=HDMI-A-1,2560x1440@59.95,0x0,1.0

# --- Example: laptop + external ---
# --- Example: laptop + external ---
# monitor = eDP-1,   preferred, 0x0,    1
# monitor = HDMI-A-1, preferred, 1920x0, 1

# Map workspace placement to specific outputs.
# Odd workspaces → $primary, even → $secondary. Use the output name
# (e.g. "DP-3"), the descriptive identifier ("desc:ASUSTek …"), or `,`
# for "any monitor" (single-monitor machines).
$primary   = DP-3
$secondary = HDMI-A-1
