input {
    kb_layout    = es
    kb_variant   =
    kb_model     =
    kb_options   =
    kb_rules     =

    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = false
    }
}

# Hyprland 0.54 dropped the `gestures {}` block in favour of standalone
# `gesture = <fingers>, <direction>, <dispatcher>` lines.
gesture = 3, horizontal, workspace

device {
    name        = epic-mouse-v1
    sensitivity = -0.5
}
