# Hyprlock — Catppuccin Mocha lock screen.

general {
    grace            = 2
    hide_cursor      = true
    disable_loading_bar = true
}

background {
    monitor     =
    color       = rgba(30,30,46,1.0)
    blur_passes = 3
    blur_size   = 8
    noise       = 0.012
    contrast    = 0.9
    brightness  = 0.85
    vibrancy    = 0.18
}

# Big clock.
label {
    monitor      =
    text         = cmd[update:1000] echo "$(date +%H:%M)"
    color        = rgba(205,214,244,1.0)
    font_size    = 96
    font_family  = JetBrainsMono Nerd Font Bold
    position     = 0, 80
    halign       = center
    valign       = center
}

# Date.
label {
    monitor      =
    text         = cmd[update:60000] echo "$(date '+%a %d %b %Y')"
    color        = rgba(186,194,222,1.0)
    font_size    = 22
    font_family  = JetBrainsMono Nerd Font
    position     = 0, -10
    halign       = center
    valign       = center
}

# Username pill.
label {
    monitor      =
    text         = $USER
    color        = rgba(180,190,254,1.0)
    font_size    = 14
    font_family  = JetBrainsMono Nerd Font
    position     = 0, -90
    halign       = center
    valign       = center
}

# Password input.
input-field {
    monitor          =
    size             = 320, 50
    outline_thickness = 2
    rounding         = 16
    inner_color      = rgba(49,50,68,0.78)
    outer_color      = rgba(203,166,247,0.85)
    check_color      = rgba(166,227,161,1.0)
    fail_color       = rgba(243,139,168,1.0)
    font_color       = rgba(205,214,244,1.0)
    placeholder_text = <span foreground="##a6adc8">enter password</span>
    fail_text        = <span>$FAIL ($ATTEMPTS)</span>
    fade_on_empty    = false
    capslock_color   = rgba(249,226,175,1.0)
    position         = 0, -160
    halign           = center
    valign           = center
}
