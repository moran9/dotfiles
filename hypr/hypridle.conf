# Hyprland idle daemon — drives lock, DPMS, and suspend on inactivity.
# Reload by killing and re-spawning hypridle (no SIGHUP support).
# The "caffeine" toggle in waybar simply kills/restarts this daemon.

general {
    lock_cmd       = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
    ignore_systemd_inhibit = false
}

# 5 min — lock the screen.
listener {
    timeout    = 300
    on-timeout = loginctl lock-session
}

# 10 min — turn the monitors off (DPMS).
listener {
    timeout    = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# 30 min — suspend. Comment out for desktop-only / always-on machines.
listener {
    timeout    = 1800
    on-timeout = systemctl suspend
}
