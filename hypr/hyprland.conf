# =====================================================================
# Hyprland — modular config.
# Files are loaded in name order from conf.d/.
# =====================================================================

# 1. Theme tokens (must be sourced before anything that uses $color vars).
source = ~/.config/hypr/theme/catppuccin-mocha.conf

# 2. Per-machine overrides (this file is the one you edit on each box).
source = ~/.config/hypr/conf.d/00-env.conf
source = ~/.config/hypr/conf.d/10-monitors.conf

# 3. Shared rules.
source = ~/.config/hypr/conf.d/20-workspaces.conf
source = ~/.config/hypr/conf.d/30-look.conf
source = ~/.config/hypr/conf.d/40-input.conf
source = ~/.config/hypr/conf.d/50-autostart.conf
source = ~/.config/hypr/conf.d/60-keybinds.conf
source = ~/.config/hypr/conf.d/70-windowrules.conf

# 4. Optional drop-in: anything in conf.d/local/*.conf will be sourced
#    if it exists. Use this for machine-specific tweaks you don't want
#    to commit (it is gitignored).
# source = ~/.config/hypr/conf.d/local/*.conf
